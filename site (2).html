<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Istanbul Clothing Online — Premium Footwear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d0d0f; --surface:#16161a; --surface2:#1e1e24;
  --line:#2a2a32; --text:#f4f2ee; --muted:#9a978f;
  --accent:#c9a24b; --accent2:#e3c988; --danger:#c0553f;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-weight:300;
  -webkit-font-smoothing:antialiased;line-height:1.5;
}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none}
a{color:inherit;text-decoration:none}

/* HEADER */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,15,.82);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.nav{max-width:1240px;margin:0 auto;padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{font-family:'Cormorant Garamond',serif;font-size:26px;
  font-weight:700;letter-spacing:.5px}
.brand span{color:var(--accent)}
.nav-actions{display:flex;align-items:center;gap:18px}
.icon-btn{background:none;color:var(--text);position:relative;
  display:flex;align-items:center;gap:7px;font-size:14px;font-weight:400}
.cart-count{position:absolute;top:-8px;right:-10px;background:var(--accent);
  color:#1a1400;font-size:11px;font-weight:600;min-width:18px;height:18px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* HERO */
.hero{max-width:1240px;margin:0 auto;padding:60px 24px 30px;text-align:center}
.hero h1{font-size:clamp(38px,6vw,68px);font-weight:600;line-height:1.05}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero p{color:var(--muted);margin-top:14px;font-size:16px;max-width:520px;
  margin-left:auto;margin-right:auto}

/* FILTERS */
.filters{max-width:1240px;margin:20px auto 0;padding:0 24px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
.chip{background:var(--surface);border:1px solid var(--line);color:var(--muted);
  padding:8px 18px;border-radius:30px;font-size:13px;font-weight:400;
  transition:.2s;letter-spacing:.3px}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:#1a1400;border-color:var(--accent);font-weight:500}

.search-wrap{max-width:600px;margin:24px auto 0;padding:0 24px}
.search-box{width:100%;background:var(--surface);border:1px solid var(--line);
  color:var(--text);padding:14px 20px 14px 46px;border-radius:30px;font-size:15px;
  font-family:inherit;position:relative}
.search-box:focus{outline:none;border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:40px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none}
.search-icon svg{width:18px;height:18px}

/* GRID */
.grid{max-width:1240px;margin:36px auto 80px;padding:0 24px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:28px}
.card{background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);overflow:hidden;transition:.25s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:#3a3a44}
.card-img{position:relative;aspect-ratio:1;background:var(--surface2);overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;transition:.4s}
.card:hover .card-img img{transform:scale(1.05)}
.badge{position:absolute;top:12px;left:12px;background:rgba(13,13,15,.8);
  backdrop-filter:blur(6px);color:var(--accent2);font-size:11px;font-weight:500;
  padding:5px 11px;border-radius:20px;letter-spacing:.5px}
.color-dots{position:absolute;bottom:12px;right:12px;display:flex;gap:5px}
.color-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.55);
  box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.card-body{padding:16px 18px 20px}
.card-brand{font-size:16px;font-weight:500;letter-spacing:.2px}
.card-meta{color:var(--muted);font-size:12.5px;margin-top:3px;
  text-transform:uppercase;letter-spacing:.6px}
.card-price{margin-top:11px;font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;color:var(--accent2)}

/* EMPTY / LOADING */
.state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.spinner{width:34px;height:34px;border:3px solid var(--line);
  border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;
  animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL (product / cart / checkout) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:40px 16px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);
  border-radius:18px;max-width:920px;width:100%;overflow:hidden;
  animation:pop .25s ease}
.modal.narrow{max-width:520px}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--line)}
.modal-head h2{font-size:24px;font-weight:600}
.close{background:var(--surface2);color:var(--text);width:34px;height:34px;
  border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center}

/* PRODUCT DETAIL */
.pd{display:grid;grid-template-columns:1.1fr 1fr}
.pd-gallery{background:var(--surface2);padding:16px}
.pd-main{aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--bg)}
.pd-main img{width:100%;height:100%;object-fit:cover}
.pd-thumbs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.pd-thumb{width:56px;height:56px;border-radius:8px;overflow:hidden;
  border:2px solid transparent;cursor:pointer;opacity:.6;transition:.2s}
.pd-thumb.active{border-color:var(--accent);opacity:1}
.pd-thumb img{width:100%;height:100%;object-fit:cover}
.pd-info{padding:28px 30px}
.pd-info h2{font-size:30px;font-weight:600;line-height:1.1}
.pd-info .meta{color:var(--muted);font-size:13px;text-transform:uppercase;
  letter-spacing:.6px;margin-top:6px}
.pd-price{font-family:'Cormorant Garamond',serif;font-size:34px;
  color:var(--accent2);margin:18px 0}
.label{font-size:12px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);margin:20px 0 10px}
.colors{display:flex;gap:9px;flex-wrap:wrap}
.color-opt{width:44px;height:44px;border-radius:10px;overflow:hidden;
  border:2px solid var(--line);cursor:pointer;transition:.2s}
.color-opt.active{border-color:var(--accent)}
.color-opt img{width:100%;height:100%;object-fit:cover}
.sizes{display:flex;gap:8px;flex-wrap:wrap}
.size-opt{min-width:46px;padding:11px 8px;text-align:center;
  background:var(--surface2);border:1px solid var(--line);border-radius:9px;
  font-size:14px;transition:.2s}
.size-opt:hover{border-color:var(--accent)}
.size-opt.active{background:var(--accent);color:#1a1400;border-color:var(--accent);font-weight:600}
.btn{width:100%;padding:15px;border-radius:11px;font-size:15px;font-weight:500;
  letter-spacing:.3px;transition:.2s;margin-top:24px}
.btn-primary{background:var(--accent);color:#1a1400}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--accent)}

/* CART */
.cart-list{padding:8px 24px;max-height:50vh;overflow-y:auto}
.cart-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--line)}
.cart-item img{width:72px;height:72px;border-radius:10px;object-fit:cover;background:var(--surface2)}
.ci-info{flex:1}
.ci-brand{font-weight:500;font-size:15px}
.ci-meta{color:var(--muted);font-size:12.5px;margin-top:3px}
.ci-price{color:var(--accent2);font-family:'Cormorant Garamond',serif;
  font-size:19px;margin-top:4px}
.ci-remove{background:none;color:var(--muted);font-size:12px;
  text-decoration:underline;align-self:flex-start;margin-top:4px}
.cart-foot{padding:20px 24px;border-top:1px solid var(--line)}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.cart-total .t{color:var(--muted);font-size:14px}
.cart-total .v{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--accent2)}

/* CHECKOUT FORM */
.form{padding:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12.5px;color:var(--muted);
  margin-bottom:6px;letter-spacing:.4px}
.field input,.field textarea,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--line);
  color:var(--text);padding:12px 14px;border-radius:10px;font-size:14px;
  font-family:inherit}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* FOOTER */
footer{border-top:1px solid var(--line);padding:44px 24px;margin-top:40px}
.foot-inner{max-width:1240px;margin:0 auto;display:flex;
  flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between}
.foot-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
.foot-brand span{color:var(--accent)}
.socials{display:flex;gap:12px}
.social{width:42px;height:42px;border-radius:11px;background:var(--surface);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  transition:.2s}
.social:hover{border-color:var(--accent);background:var(--surface2)}
.social svg{width:19px;height:19px;fill:var(--text)}
.foot-note{color:var(--muted);font-size:12.5px}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--accent);color:#1a1400;padding:14px 26px;border-radius:12px;
  font-weight:500;font-size:14px;z-index:200;opacity:0;transition:.3s;
  box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:720px){
  .pd{grid-template-columns:1fr}
  .hero{padding:40px 20px 20px}
  .grid{gap:18px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .row2{grid-template-columns:1fr}
  .modal-head h2{font-size:20px}
}
</style>
</head>

    let renkler=[];
    if(ids.length){
      const r = await sb.from('renkler').select('*').in('urun_id',ids).order('sira');
      renkler = r.data||[];
    }
    PRODUCTS = urunler.map(u=>({
      ...u,
      renkler: renkler.filter(r=>r.urun_id===u.id)
    })).filter(p=>p.renkler.length && p.renkler.some(r=>r.gorseller?.length));

    buildFilters();
    render();
  }catch(e){
    $('grid').innerHTML=`<div class="state">Could not load products.<br><small>${esc(e.message||'')}</small></div>`;
  }
}

function firstImage(p){
  for(const r of p.renkler){
    if(r.gorseller?.length){
      const kapakIdx = r.kapak_index || 0;
      const kapak = r.gorseller[kapakIdx];
      if(kapak && !/\.(mp4|mov|webm|avi|mkv|m4v|3gp)($|\?)/i.test(kapak)) return kapak;
      const img = r.gorseller.find(g=>!/\.(mp4|mov|webm|avi|mkv|m4v|3gp)($|\?)/i.test(g)) || r.gorseller[0];
      return img;
    }
  }
  return "";
}

/* ---------- FILTERS ---------- */
function buildFilters(){
  const types=[...new Set(PRODUCTS.map(p=>p.tip).filter(Boolean))];
  const box=$('filters');
  box.innerHTML='';
  const mk=(label,val)=>{
    const b=document.createElement('button');
    b.className='chip'+(activeFilter===val?' active':'');
    b.textContent=label;b.onclick=()=>{activeFilter=val;buildFilters();render()};
    box.appendChild(b);
  };
  mk('All','ALL');
  mk('Women','WOMAN');mk('Men','MAN');
  types.forEach(t=>mk(t.charAt(0)+t.slice(1).toLowerCase(),'TIP:'+t));
}

function match(p){
  const q=($('searchBox').value||'').trim().toLowerCase();
  if(q && !(p.marka||'').toLowerCase().includes(q)) return false;
  if(activeFilter==='ALL')return true;
  if(activeFilter==='WOMAN')return (p.cinsiyet||[]).includes('WOMAN');
  if(activeFilter==='MAN')return (p.cinsiyet||[]).includes('MAN');
  if(activeFilter.startsWith('TIP:'))return p.tip===activeFilter.slice(4);
  return true;
}

/* ---------- RENDER GRID ---------- */
function render(){
  const list=PRODUCTS.filter(match);
  const grid=$('grid');
  if(!list.length){grid.innerHTML='<div class="state">No products in this category yet.</div>';return}
  grid.innerHTML=list.map(p=>{
    const img=firstImage(p);
    const gender=(p.cinsiyet||[]).length===2?'Unisex':(p.cinsiyet||[])[0]||'';
    const dots=p.renkler.length>1
      ? `<div class="color-dots">${p.renkler.slice(0,5).map(()=>'<span></span>').join('')}</div>`:'';
    return `<div class="card" onclick="openProduct(${p.id})">
      <div class="card-img">
        ${p.tip?`<div class="badge">${esc(p.tip)}</div>`:''}
        <img src="${esc(img)}" loading="lazy" alt="${esc(p.marka)}">
        ${dots}
      </div>
      <div class="card-body">
        <div class="card-brand">${esc(p.marka)}</div>
        <div class="card-meta">${esc(gender)}${p.renkler.length>1?' · '+p.renkler.length+' colors':''}</div>
        <div class="card-price">${money(p.fiyat_gbp)}</div>
      </div>
    </div>`;
  }).join('');
}

/* ---------- PRODUCT DETAIL ---------- */
let PD={product:null,color:0,img:0,size:null,renkId:null};

function openProduct(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  const ilkKapak=(p.renkler[0]?.kapak_index)||0;
  PD={product:p,color:0,img:ilkKapak,size:null,renkId:null};
  renderPD();
  $('pdOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePD(){$('pdOverlay').classList.remove('open');document.body.style.overflow=''}

function renderPD(){
  const p=PD.product;
  const color=p.renkler[PD.color];
  const imgs=(color.gorseller||[]);
  const mainSrc=imgs[PD.img]||imgs[0]||'';
  const isVid=/\.(mp4|mov|webm|avi|mkv|m4v|3gp)($|\?)/i.test(mainSrc);
  const gender=(p.cinsiyet||[]).length===2?'Unisex':(p.cinsiyet||[])[0]||'';

  $('pdModal').innerHTML=`
    <div class="modal-head">
      <h2>Product</h2>
      <button class="close" onclick="closePD()">×</button>
    </div>
    <div class="pd">
      <div class="pd-gallery">
        <div class="pd-main">
          ${isVid
            ?`<video src="${esc(mainSrc)}" controls style="width:100%;height:100%;object-fit:cover"></video>`
            :`<img src="${esc(mainSrc)}" alt="">`}
        </div>
        <div class="pd-thumbs">
          ${imgs.map((g,i)=>{
            const v=/\.(mp4|mov|webm|avi|mkv|m4v|3gp)($|\?)/i.test(g);
            return `<div class="pd-thumb ${i===PD.img?'active':''}" onclick="setImg(${i})">
              ${v?`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-size:11px">▶</div>`
                 :`<img src="${esc(g)}" alt="">`}
            </div>`}).join('')}
        </div>
      </div>
      <div class="pd-info">
        <h2>${esc(p.marka)}</h2>
        <div class="meta">${esc(gender)}${p.tip?' · '+esc(p.tip):''}</div>
        <div class="pd-price">${money(p.fiyat_gbp)}${p.fiyat_eur?` <span style="font-size:18px;color:var(--muted)">/ €${p.fiyat_eur}</span>`:''}</div>

        ${p.renkler.length>1?`
          <div class="label">Color — ${PD.color+1} of ${p.renkler.length}</div>
          <div class="colors">
            ${p.renkler.map((r,i)=>{
              const kapakIdx=r.kapak_index||0;
              const kapak=(r.gorseller||[])[kapakIdx];
              const cimg=(kapak && !/\.(mp4|mov|webm|avi|mkv|m4v|3gp)($|\?)/i.test(kapak)) ? kapak
                         : (r.gorseller||[]).find(g=>!/\.(mp4|mov|webm|avi|mkv|m4v|3gp)($|\?)/i.test(g))||'';
              return `<div class="color-opt ${i===PD.color?'active':''}" onclick="setColor(${i})">
                <img src="${esc(cimg)}" alt=""></div>`}).join('')}
          </div>
          ${color.not_?`<div style="color:var(--muted);font-size:12.5px;margin-top:8px">${esc(color.not_)}</div>`:''}`
          :(color.not_?`<div style="color:var(--muted);font-size:12.5px;margin:-10px 0 16px">${esc(color.not_)}</div>`:'')}

        ${renkSecenekleriHTML(color)}

        <div class="label">Size (EU)</div>
        <div class="sizes">
          ${(p.bedenler||[]).map(b=>`<div class="size-opt ${PD.size===b?'active':''}" onclick="setSize(${b})">${b}</div>`).join('')||'<span style="color:var(--muted)">Contact us</span>'}
        </div>

        <button class="btn btn-primary" id="addBtn" ${canAddToCart()?'':'disabled'} onclick="addToCart()">
          ${addToCartLabel()}
        </button>
      </div>
    </div>`;
}

function renkSecenekleri(color){
  const idler = color.palet_idler || [];
  return PALET.filter(c => idler.includes(c.id));
}

function renkSecenekleriHTML(color){
  const secenekler = renkSecenekleri(color);
  if(secenekler.length < 2) return '';
  return `
    <div class="label">Color Shade</div>
    <div class="sizes">
      ${secenekler.map(c=>`<div class="size-opt ${PD.renkId===c.id?'active':''}" onclick="setRenk(${c.id})">
        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${c.hex};margin-right:6px;vertical-align:middle;border:1px solid rgba(255,255,255,.3)"></span>${c.ad}
      </div>`).join('')}
    </div>`;
}

function canAddToCart(){
  if(!PD.size) return false;
  const color = PD.product.renkler[PD.color];
  const secenekler = renkSecenekleri(color);
  if(secenekler.length >= 2 && !PD.renkId) return false;
  return true;
}

function addToCartLabel(){
  if(!PD.size) return 'Select a size';
  const color = PD.product.renkler[PD.color];
  const secenekler = renkSecenekleri(color);
  if(secenekler.length >= 2 && !PD.renkId) return 'Select a color shade';
  return 'Add to Cart';
}

function setRenk(paletId){PD.renkId=paletId;renderPD()}
function setColor(i){
  PD.color=i;
  PD.img=(PD.product.renkler[i]?.kapak_index)||0;
  PD.renkId=null;
  renderPD()
}
function setImg(i){PD.img=i;renderPD()}
function setSize(b){PD.size=b;renderPD()}

function addToCart(){
  const p=PD.product;
  if(!canAddToCart())return;
  const color=p.renkler[PD.color];
  const cover=(color.gorseller||[]).find(g=>!/\.(mp4|mov|webm|avi|mkv|m4v|3gp)($|\?)/i.test(g))||'';
  const renkAdi = PD.renkId ? (PALET.find(c=>c.id===PD.renkId)||{}).ad : null;
  CART.push({
    urun_id:p.id, marka:p.marka, tip:p.tip,
    renk_no:PD.color+1, renk_toplam:p.renkler.length, renk_adi:renkAdi,
    beden:PD.size, fiyat_gbp:p.fiyat_gbp||0, fiyat_eur:p.fiyat_eur||0, img:cover
  });
  updateCart();
  closePD();
  toast('Added to cart');
}

/* ---------- CART ---------- */
function updateCart(){
  const c=$('cartCount');
  if(CART.length){c.style.display='flex';c.textContent=CART.length}
  else c.style.display='none';
}
function openCart(){renderCart();$('cartOverlay').classList.add('open');document.body.style.overflow='hidden'}
function closeCart(){$('cartOverlay').classList.remove('open');document.body.style.overflow=''}

function renderCart(){
  const sym = PARA_BIRIMI==='GBP' ? '£' : '€';
  const key = PARA_BIRIMI==='GBP' ? 'fiyat_gbp' : 'fiyat_eur';
  const total=CART.reduce((s,i)=>s+(i[key]||0),0);
  $('cartModal').innerHTML=`
    <div class="modal-head">
      <h2>Your Cart</h2>
      <button class="close" onclick="closeCart()">×</button>
    </div>
    ${CART.length?`
    <div style="padding:12px 24px 0;display:flex;gap:8px;justify-content:flex-end">
      <button class="chip ${PARA_BIRIMI==='GBP'?'active':''}" style="padding:6px 16px" onclick="setCurrency('GBP')">£ GBP</button>
      <button class="chip ${PARA_BIRIMI==='EUR'?'active':''}" style="padding:6px 16px" onclick="setCurrency('EUR')">€ EUR</button>
    </div>
    <div class="cart-list">
      ${CART.map((i,idx)=>`
        <div class="cart-item">
          <img src="${esc(i.img)}" alt="">
          <div class="ci-info">
            <div class="ci-brand">${esc(i.marka)}</div>
            <div class="ci-meta">Size ${i.beden}${i.renk_toplam>1?' · Color '+i.renk_no:''}${i.renk_adi?' · '+esc(i.renk_adi):''}${i.tip?' · '+esc(i.tip):''}</div>
            <div class="ci-price">${sym}${i[key]||0}</div>
            <button class="ci-remove" onclick="removeItem(${idx})">Remove</button>
          </div>
        </div>`).join('')}
    </div>
    <div class="cart-foot">
      <div class="cart-total"><span class="t">Items total</span><span class="v">${sym}${total}</span></div>
      <button class="btn btn-primary" onclick="openCheckout()">Checkout</button>
    </div>`
    :`<div class="state">Your cart is empty.</div>`}`;
}
function setCurrency(c){PARA_BIRIMI=c;renderCart()}
function removeItem(i){CART.splice(i,1);updateCart();renderCart()}

/* ---------- CHECKOUT ---------- */
function openCheckout(){
  if(!CART.length)return;
  closeCart();
  const sym = PARA_BIRIMI==='GBP' ? '£' : '€';
  const key = PARA_BIRIMI==='GBP' ? 'fiyat_gbp' : 'fiyat_eur';
  const itemsTotal=CART.reduce((s,i)=>s+(i[key]||0),0);
  const kargoKey = PARA_BIRIMI==='GBP' ? 'gbp' : 'eur';

  $('coModal').innerHTML=`
    <div class="modal-head">
      <h2>Checkout</h2>
      <button class="close" onclick="closeCheckout()">×</button>
    </div>
    <div class="form">
      <div class="row2">
        <div class="field"><label>First & Last Name *</label><input id="f-name" placeholder="John Doe"></div>
        <div class="field"><label>Phone (WhatsApp) *</label><input id="f-phone" placeholder="+44…"></div>
      </div>
      <div class="field"><label>Email *</label><input id="f-email" type="email" placeholder="you@email.com"></div>
      <div class="field"><label>Delivery Address *</label><textarea id="f-addr" placeholder="Street, city, postcode, country"></textarea></div>

      <div class="field"><label>Shipping *</label>
        <select id="f-kargo" onchange="renderCoTotal()">
          <option value="fast">${KARGO.fast.ad} — ${sym}${KARGO.fast[kargoKey]}</option>
          <option value="normal">${KARGO.normal.ad} — ${sym}${KARGO.normal[kargoKey]}</option>
        </select>
      </div>

      <div class="field"><label>Payment Method *</label>
        <select id="f-pay">${PAYMENTS.map(p=>`<option>${esc(p)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Note (optional)</label><textarea id="f-note" placeholder="Anything we should know?"></textarea></div>

      <div id="co-breakdown" style="margin:6px 0 14px"></div>
      <button class="btn btn-primary" id="placeBtn" onclick="placeOrder()">Place Order via WhatsApp</button>
      <p style="color:var(--muted);font-size:12px;text-align:center;margin-top:12px">
        You'll be redirected to WhatsApp to confirm payment details.</p>
    </div>`;
  $('coOverlay').classList.add('open');document.body.style.overflow='hidden';
  renderCoTotal();
}

function renderCoTotal(){
  const sym = PARA_BIRIMI==='GBP' ? '£' : '€';
  const key = PARA_BIRIMI==='GBP' ? 'fiyat_gbp' : 'fiyat_eur';
  const kargoKey = PARA_BIRIMI==='GBP' ? 'gbp' : 'eur';
  const itemsTotal=CART.reduce((s,i)=>s+(i[key]||0),0);
  const kargoSecim=$('f-kargo').value;
  const kargoTutar=KARGO[kargoSecim][kargoKey];
  const genelToplam=itemsTotal+kargoTutar;
  $('co-breakdown').innerHTML=`
    <div class="cart-total" style="margin-bottom:6px"><span class="t">Items</span><span style="font-size:15px">${sym}${itemsTotal}</span></div>
    <div class="cart-total" style="margin-bottom:6px"><span class="t">Shipping</span><span style="font-size:15px">${sym}${kargoTutar}</span></div>
    <div class="cart-total" style="border-top:1px solid var(--line);padding-top:10px">
      <span class="t">Total</span><span class="v">${sym}${genelToplam}</span></div>`;
}
function closeCheckout(){$('coOverlay').classList.remove('open');document.body.style.overflow=''}

async function placeOrder(){
  const name=$('f-name').value.trim();
  const phone=$('f-phone').value.trim();
  const email=$('f-email').value.trim();
  const addr=$('f-addr').value.trim();
  const kargoSecim=$('f-kargo').value;
  const pay=$('f-pay').value;
  const note=$('f-note').value.trim();

  if(!name||!phone||!email||!addr){toast('Please fill all required fields');return}

  const sym = PARA_BIRIMI==='GBP' ? '£' : '€';
  const key = PARA_BIRIMI==='GBP' ? 'fiyat_gbp' : 'fiyat_eur';
  const kargoKey = PARA_BIRIMI==='GBP' ? 'gbp' : 'eur';
  const itemsTotal=CART.reduce((s,i)=>s+(i[key]||0),0);
  const kargoTutar=KARGO[kargoSecim][kargoKey];
  const genelToplam=itemsTotal+kargoTutar;

  const btn=$('placeBtn');btn.disabled=true;btn.textContent='Placing…';

  const sepet=CART.map(i=>({
    marka:i.marka,beden:i.beden,renk:i.renk_no,renk_adi:i.renk_adi||null,adet:1,fiyat:i[key],urun_id:i.urun_id
  }));

  // 1) save to Supabase
  try{
    await sb.from('siparisler').insert({
      musteri_ad:name, telefon:phone, eposta:email, adres:addr,
      sepet:sepet, tutar:genelToplam, para_birimi:PARA_BIRIMI,
      kargo_yontemi:KARGO[kargoSecim].ad, kargo_tutar:kargoTutar,
      odeme_yontemi:pay, not_:note, durum:'yeni'
    });
  }catch(e){/* still continue to whatsapp */}

  // 2) build WhatsApp message
  let msg=`🛒 *NEW ORDER — Istanbul Clothing Online*%0A%0A`;
  msg+=`*Name:* ${name}%0A*Phone:* ${phone}%0A*Email:* ${email}%0A`;
  msg+=`*Address:* ${addr}%0A*Shipping:* ${KARGO[kargoSecim].ad}%0A*Payment:* ${pay}%0A`;
  if(note)msg+=`*Note:* ${note}%0A`;
  msg+=`%0A*ITEMS:*%0A`;
  CART.forEach(i=>{
    msg+=`• ${i.marka} — Size ${i.beden}${i.renk_toplam>1?' (Color '+i.renk_no+')':''}${i.renk_adi?' — '+i.renk_adi:''} — ${sym}${i[key]}%0A`;
  });
  msg+=`%0AShipping: ${sym}${kargoTutar}`;
  msg+=`%0A*TOTAL: ${sym}${genelToplam}*`;

  window.open(`https://wa.me/${WHATSAPP}?text=${msg}`,'_blank');

  CART=[];updateCart();closeCheckout();
  toast('Order sent! Continue on WhatsApp');
}

/* close on overlay click */
['pdOverlay','cartOverlay','coOverlay'].forEach(id=>{
  $(id).addEventListener('click',e=>{if(e.target.id===id){
    e.target.classList.remove('open');document.body.style.overflow='';
  }});
});

async function ziyaretKaydet(){
  try{
    const params = new URLSearchParams(window.location.search);
    const kaynak = params.get('src') || 'direct';
    await sb.from('ziyaretler').insert({kaynak, sayfa:'anasayfa'});
  }catch(e){/* sessiz gec, kullaniciyi etkilemesin */}
}

load();
ziyaretKaydet();
</script>
</body>
</html>
